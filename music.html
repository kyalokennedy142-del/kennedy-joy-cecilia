<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Our Soundtrack | Kennedy & Joy Cecilia</title>
  <meta name="description" content="The songs that define Kennedy and Joy Cecilia's love story" />
  <meta name="theme-color" content="#0a0618" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body class="page-music page-music-compact">
  <div id="cursor" aria-hidden="true"></div>
  <div id="cursor-ring" aria-hidden="true"></div>
  <div class="stars" id="stars" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <!-- Navigation -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav__logo">
      <a href="index.html">K <span class="nav__amp">&</span> J</a>
    </div>
    <ul class="nav__links">
      <li><a href="index.html" class="nav__link">Home</a></li>
      <li><a href="about.html" class="nav__link">Our Story</a></li>
      <li><a href="profiles.html" class="nav__link">Us</a></li>
      <li><a href="memories.html" class="nav__link">Memories</a></li>
      <li><a href="music.html" class="nav__link nav__link--active">Music</a></li>
    </ul>
    <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main id="main" role="main">
    
    <!-- Compact Music Page Layout -->
    <section class="music-compact-wrapper">
      
      <!-- Profile & Title - BIG PHOTOS SIDE BY SIDE -->
      <div class="music-compact-header">
        <div class="music-compact-photos">
          <div class="music-photo-item">
            <img src="assets/images/memories/07-growing-together.jpg" alt="Kennedy & Joy growing together" class="music-photo-large" />
            <span class="music-photo-label">Growing Together</span>
          </div>
          <div class="music-photo-item">
            <img src="assets/images/memories/16-good-day.jpg" alt="Kennedy & Joy - a good day" class="music-photo-large" />
            <span class="music-photo-label">A Good Day</span>
          </div>
        </div>
        <h1 class="music-compact-title">Kennedy & Joy Cecilia</h1>
        <div class="music-compact-badges">
          <span class="badge-compact">💛 Together</span>
          <span class="badge-compact">✨ Forever</span>
          <span class="badge-compact">🎵 Our Sound</span>
        </div>
      </div>

      <!-- YouTube Frame - Visible on Load -->
      <div class="current-vibe-section">
        <div class="current-vibe-label">
          <span>📼</span>
          <span>OUR SOUNDTRACK</span>
        </div>
        
        <div class="youtube-frame-wrapper" id="youtubeFrameWrapper">
          <div id="yt-compact-player"></div>
        </div>
        
        <div class="now-playing-info">
          <span class="now-playing-label">Now Playing</span>
          <h3 class="now-playing-song" id="compactCurrentSong">Loading...</h3>
          <p class="now-playing-artist" id="compactCurrentArtist">Please wait</p>
        </div>
        
        <div class="compact-controls">
          <button class="compact-btn" id="compactBtnPrev" aria-label="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
          </button>
          <button class="compact-btn compact-btn--play" id="compactBtnPlay" aria-label="Play/Pause">
            <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x1="6" y1="4" width="4" height="16"/><rect x1="14" y1="4" width="4" height="16"/></svg>
          </button>
          <button class="compact-btn" id="compactBtnNext" aria-label="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
          </button>
        </div>
        
        <!-- Volume Control -->
        <div class="volume-control-compact">
          <svg class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <input type="range" class="volume-slider" id="compactVolumeSlider" min="0" max="100" value="70" />
        </div>
      </div>

      <!-- Playlist -->
      <div class="playlist-compact">
        <div class="playlist-compact-inner" id="playlistCompactInner"></div>
      </div>

    </section>

    <!-- Return Home -->
    <section class="page-nav">
      <a href="index.html" class="page-nav__link">
        <span class="page-nav__label">Return to</span>
        <span class="page-nav__title">← Home</span>
      </a>
    </section>

  </main>

  <footer class="footer">
    <div class="footer__content">
      <p class="footer__text">Made with love for <strong>Kennedy</strong> &amp; <strong>Joy Cecilia</strong></p>
      <small>© <span id="year"></span></small>
    </div>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="assets/js/script.js" defer></script>
</body>
</html>
